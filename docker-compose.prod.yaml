volumes:
  auth_postgresql:

networks:
  auth_backend:
    driver: "bridge"

services:
  jwt_auth:
    build:
      context: .
      dockerfile: docker/prod/app/Dockerfile
    container_name: app_jwt_auth

    depends_on:
      - db

    env_file:
      - .env

    environment:
      DB_HOST: db

    ports:
      - "8000:8000"

    restart: unless-stopped

    networks:
      - auth_backend

  db:
    image: postgres:18.4-alpine
    container_name: db_jwt_auth

    volumes:
      - "auth_postgresql:/var/lib/postgresql"

    environment:
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}

    restart: unless-stopped

    networks:
      - auth_backend